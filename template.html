<body>

  <div id="weather-bg" class="weather-bg"></div>
  <script src="assets/js/sketch-loop.js"></script>
  <script>
    SketchLoop.mount('#weather-bg', {
      threshold:   0.75,
      clumpSize:   80,
      turbulence:  0.75,
      fallSpeed:   0.1,
      angle:       -6,
      strokeLen:   18,
      strokeWidth: 2.1,
      wobble:      1,
      drawTime:    6000,
      scale:       0.8,
      taperBottom: 0.55,
      taperCurve:  1.6,
      clearRadius:   140,  // cursor-clear radius in px (desktop only)
      clearStrength: 1,    // how fully ink is suppressed at the cursor center
      clearCurve:    1.5,  // falloff shape
      clearUndrawBoost: 15,// un-draw rate multiplier inside the clear zone
      clearAlpha:    0,    // 0 = no translucency, only reverse-trace un-draw clears the zone
    });
    // Size the weather-bg to end a bit past the home view's main h1 —
    // the extension is the region that tapers out.
    (function () {
      var bg = document.getElementById('weather-bg');
      var EXTRA_PX = 220; // how far past the h1's bottom edge to extend; taper happens within this band
      function sizeWeather() {
        var h1 = document.querySelector('.site-main .view[data-view="home"] h1');
        if (!bg || !h1) return;
        var r = h1.getBoundingClientRect();
        bg.style.height = Math.max(0, r.bottom + EXTRA_PX) + 'px';
      }
      sizeWeather();
      window.addEventListener('load', sizeWeather);
      window.addEventListener('resize', sizeWeather);
      if (document.fonts && document.fonts.ready) document.fonts.ready.then(sizeWeather);
    })();
  </script>

  <div class="page" data-current-view="home">

    <header class="site-header">
      <div class="masthead" data-view="home">
        <span class="masthead__title">DELUS</span>
        <span class="masthead__subtitle">Journal for Landscape<br class="mobile-only"> and Urban Studies</span>
      </div>
      <nav class="site-nav">
        <a href="#" data-view="about">About</a>
        <a href="https://www.hatjecantz.com/products/66089-delus-the-journal-of-the-institute-of-landscape-and-urban-studies" data-image="assets/images/issue-00.png">Issue 0</a>
        <a href="https://www.hatjecantz.com/products/77075-delus-the-journal-of-the-institute-of-landscape-and-urban-studies" data-image="assets/images/issue-01.png">Issue 1</a>
        <a href="#" data-view="donate">Donate</a>
      </nav>
      <a href="#" class="site-nav-back" data-view="home">Open call</a>
    </header>

    <main class="site-main">
      <article class="view view--active" data-view="home">
        <section class="section section--intro">{{INTRO}}</section>
        <section class="section section--open-call">{{OPEN_CALL}}</section>
        <section class="section section--cta desktop-cta">{{CTA}}</section>
      </article>
      <article class="view" data-view="about" inert><section class="section">{{ABOUT_MAIN}}</section><section class="section section--cta desktop-cta">{{ABOUT_CTA}}</section></article>
      <article class="view" data-view="donate" inert><section class="section">{{DONATE_MAIN}}</section><section class="section section--cta desktop-cta">{{DONATE_CTA}}</section></article>
    </main>

    <a href="#open-call-section" class="mobile-open-call-pill">Open call</a>

    <aside id="open-call-section" class="site-service">
      <article class="view view--active" data-view="home">
        <section class="section section--dates">{{DATES}}</section>
      </article>
      <article class="view" data-view="about" inert>{{ABOUT_SERVICE}}</article>
      <article class="view" data-view="donate" inert>{{DONATE_SERVICE}}</article>
    </aside>

    <div class="site-cta">
      <div class="view view--active" data-view="home"><section class="section section--cta">{{CTA}}</section></div>
      <div class="view" data-view="about" inert><section class="section section--cta">{{ABOUT_CTA}}</section></div>
      <div class="view" data-view="donate" inert><section class="section section--cta">{{DONATE_CTA}}</section></div>
    </div>

    <footer class="site-footer">
      {{FOOTER}}
    </footer>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // Open all external links in a new tab
      document.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href');
        if (href && !href.startsWith('#') && !href.startsWith('mailto:')) {
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }
      });

      // Custom footnote tooltips — follows cursor
      let activeTip = null;
      document.querySelectorAll('.footnote[data-tooltip]').forEach(el => {
        el.addEventListener('mouseenter', () => {
          activeTip = document.createElement('div');
          activeTip.className = 'tooltip';
          activeTip.innerHTML = el.dataset.tooltip;
          document.body.appendChild(activeTip);
        });
        el.addEventListener('mousemove', (e) => {
          if (!activeTip) return;
          activeTip.style.left = e.clientX + 12 + 'px';
          activeTip.style.top  = e.clientY + 12 + 'px';
        });
        el.addEventListener('mouseleave', () => {
          if (activeTip) { activeTip.remove(); activeTip = null; }
        });
      });

      // Image tooltips for issue links
      let activeImageTip = null;

      function createImageTip(el, centered) {
        if (activeImageTip) { activeImageTip.remove(); activeImageTip = null; }
        activeImageTip = document.createElement('div');
        activeImageTip.className = 'image-tooltip';
        const img = document.createElement('img');
        img.src = el.dataset.image;
        img.alt = '';
        activeImageTip.appendChild(img);
        if (centered) {
          const buy = document.createElement('a');
          buy.className = 'image-tooltip__buy';
          buy.href = el.href;
          buy.target = '_blank';
          buy.rel = 'noopener noreferrer';
          buy.textContent = 'Buy at Hatje Cantz';
          buy.addEventListener('click', (e) => e.stopPropagation());
          activeImageTip.appendChild(buy);
        }
        document.body.appendChild(activeImageTip);
        const rect = el.getBoundingClientRect();
        if (centered) {
          activeImageTip.style.left      = (rect.left + rect.width / 2) + 'px';
          activeImageTip.style.transform = 'translateX(-50%)';
        } else {
          activeImageTip.style.right = (window.innerWidth - rect.right) + 'px';
        }
        activeImageTip.style.top = (rect.bottom + 12) + 'px';
      }

      // Dismiss on tap outside tooltip or issue link
      document.addEventListener('click', (e) => {
        if (activeImageTip && !e.target.closest('[data-image]') && !e.target.closest('.image-tooltip')) {
          activeImageTip.remove();
          activeImageTip = null;
        }
      });

      document.querySelectorAll('[data-image]').forEach(el => {
        // Mobile: tap toggles tooltip + buy box; link does not navigate
        el.addEventListener('click', (e) => {
          if (!window.matchMedia('(hover: none)').matches) return;
          e.preventDefault();
          if (activeImageTip) { activeImageTip.remove(); activeImageTip = null; return; }
          createImageTip(el, true);
        });
        // Desktop: hover shows image only
        el.addEventListener('mouseenter', () => {
          if (window.matchMedia('(hover: none)').matches) return;
          createImageTip(el, false);
        });
        el.addEventListener('mouseleave', () => {
          if (activeImageTip) { activeImageTip.remove(); activeImageTip = null; }
        });
      });

      // View-swap handler — fade out, then fade in
      const header = document.querySelector('.site-header');
      const footer = document.querySelector('.site-footer');
      document.querySelectorAll('.site-nav [data-view], .masthead[data-view], .site-service [data-view], .site-nav-back[data-view]').forEach(trigger => {
        trigger.addEventListener('click', (e) => {
          e.preventDefault();
          const target = trigger.dataset.view;
          const outgoing = [...document.querySelectorAll('.view--active')];
          if (!outgoing.length || outgoing[0].dataset.view === target) return;
          if (activeImageTip) { activeImageTip.remove(); activeImageTip = null; }
          document.querySelector('.page').dataset.currentView = target;

          document.querySelectorAll('.site-nav a').forEach(a => {
            if (a.dataset.view === target) a.setAttribute('aria-current', 'page');
            else a.removeAttribute('aria-current');
          });

          header.classList.add('header--fading');
          footer.classList.add('footer--fading');
          const page = document.querySelector('.page');
          page.style.minHeight = page.offsetHeight + 'px';

          let finished = false;
          function finishSwap() {
            if (finished) return;
            finished = true;
            outgoing.forEach(v => v.setAttribute('inert', ''));
            document.querySelectorAll(`.view[data-view="${target}"]`).forEach(nv => {
              nv.removeAttribute('inert');
              nv.classList.add('view--active');
            });
            header.classList.remove('header--fading');
            footer.classList.remove('footer--fading');
            page.style.minHeight = '';
          }

          // Only views that are actually rendered will fire transitionend.
          // Views inside display:none ancestors (e.g. .site-cta on desktop)
          // never transition, so exclude them from the pending count.
          const animated = outgoing.filter(v => v.offsetParent !== null);
          let pending = animated.length;
          outgoing.forEach(v => v.classList.remove('view--active'));
          if (pending === 0) {
            finishSwap();
          } else {
            animated.forEach(v => {
              v.addEventListener('transitionend', function handler(e) {
                if (e.target !== v || e.propertyName !== 'opacity') return;
                v.removeEventListener('transitionend', handler);
                if (--pending === 0) finishSwap();
              });
            });
            // Safety net: if transitionend is swallowed for any reason, still finish.
            setTimeout(finishSwap, 1200);
          }
        });
      });

      // Mobile open-call pill: hide when side column scrolls into view
      const pill = document.querySelector('.mobile-open-call-pill');
      const openCallSection = document.getElementById('open-call-section');
      if (pill && openCallSection) {
        new IntersectionObserver((entries) => {
          pill.classList.toggle('is-hidden', entries[0].isIntersecting);
        }, { threshold: 0 }).observe(openCallSection);
      }

    });
  </script>

</body>
