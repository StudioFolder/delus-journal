<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="description" content="Delus Journal — Open Call">
  <meta name="author" content="Delus Journal">
  <meta property="og:title" content="Delus Journal">
  <meta property="og:description" content="Delus Journal — Open Call">
  <meta property="og:url" content="https://delusjournal.com">
  <meta property="og:type" content="website">
  <!-- <meta property="og:image" content="https://delusjournal.com/assets/og-image.jpg"> -->
  <title>Delus Journal</title>

  <!-- TODO: add real typefaces once design is finalised -->
  <!-- <link rel="preconnect" href="https://fonts.googleapis.com"> -->
  <!-- <link rel="stylesheet" href="..."> -->

  <link rel="preload" href="assets/fonts/Louize-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="assets/fonts/StyreneB-Regular.otf" as="font" type="font/otf" crossorigin>
  <link rel="stylesheet" href="style.css">
  <!-- <link rel="icon" type="image/svg+xml" href="favicon.svg"> -->
  <link rel="canonical" href="https://delusjournal.com">

  <noscript>
    <style>
      .page { opacity: 1 !important; animation: none !important; }
    </style>
  </noscript>

  <!-- Analytics — add once live -->
  <!-- <script defer src="https://cloud.umami.is/script.js" data-website-id="TODO"></script> -->
  <!-- <script defer src="/_vercel/insights/script.js"></script> -->
</head>
<body>

  <div class="page">

    <header class="site-header">
      <div class="masthead" data-view="home">
        <span class="masthead__title">DELUS</span>
        <span class="masthead__subtitle">Journal for Landscape and Urban Studies</span>
      </div>
      <nav class="site-nav">
        <a href="#" data-view="about">About</a>
        <a href="https://www.hatjecantz.com/products/66089-delus-the-journal-of-the-institute-of-landscape-and-urban-studies" data-image="assets/images/issue-00.png">Issue 0</a>
        <a href="https://www.hatjecantz.com/products/77075-delus-the-journal-of-the-institute-of-landscape-and-urban-studies" data-image="assets/images/issue-01.png">Issue 1</a>
        <a href="#" data-view="donate">Donate</a>
      </nav>
    </header>

    <main class="site-main">
      <article class="view view--active" data-view="home">
        <section class="section section--intro">{{INTRO}}</section>
        <section class="section section--open-call">{{OPEN_CALL}}</section>
        <section class="section section--cta">{{CTA}}</section>
      </article>
      <article class="view" data-view="about" inert><section class="section">{{ABOUT_MAIN}}</section><section class="section section--cta">{{ABOUT_CTA}}</section></article>
      <article class="view" data-view="donate" inert><section class="section">{{DONATE_MAIN}}</section><section class="section section--cta">{{DONATE_CTA}}</section></article>
    </main>

    <aside class="site-service">
      <article class="view view--active" data-view="home">
        <section class="section section--dates">{{DATES}}</section>
      </article>
      <article class="view" data-view="about" inert>{{ABOUT_SERVICE}}</article>
      <article class="view" data-view="donate" inert>{{DONATE_SERVICE}}</article>
    </aside>

    <footer class="site-footer">
      {{FOOTER}}
    </footer>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {

      // Open all external links in a new tab
      document.querySelectorAll('a[href]').forEach(link => {
        const href = link.getAttribute('href');
        if (href && !href.startsWith('#') && !href.startsWith('mailto:')) {
          link.setAttribute('target', '_blank');
          link.setAttribute('rel', 'noopener noreferrer');
        }
      });

      // Custom footnote tooltips — follows cursor
      let activeTip = null;
      document.querySelectorAll('.footnote[data-tooltip]').forEach(el => {
        el.addEventListener('mouseenter', () => {
          activeTip = document.createElement('div');
          activeTip.className = 'tooltip';
          activeTip.innerHTML = el.dataset.tooltip;
          document.body.appendChild(activeTip);
        });
        el.addEventListener('mousemove', (e) => {
          if (!activeTip) return;
          activeTip.style.left = e.clientX + 12 + 'px';
          activeTip.style.top  = e.clientY + 12 + 'px';
        });
        el.addEventListener('mouseleave', () => {
          if (activeTip) { activeTip.remove(); activeTip = null; }
        });
      });

      // Image tooltips for issue links
      let activeImageTip = null;
      document.querySelectorAll('[data-image]').forEach(el => {
        el.addEventListener('mouseenter', () => {
          activeImageTip = document.createElement('div');
          activeImageTip.className = 'image-tooltip';
          const img = document.createElement('img');
          img.src = el.dataset.image;
          img.alt = '';
          activeImageTip.appendChild(img);
          document.body.appendChild(activeImageTip);
          const rect = el.getBoundingClientRect();
          activeImageTip.style.right = (window.innerWidth - rect.right) + 'px';
          activeImageTip.style.top  = (rect.bottom + 12) + 'px';
        });
        el.addEventListener('mouseleave', () => {
          if (activeImageTip) { activeImageTip.remove(); activeImageTip = null; }
        });
      });

      // View-swap handler — fade out, then fade in
      document.querySelectorAll('.site-nav [data-view], .masthead[data-view], .site-service [data-view]').forEach(trigger => {
        trigger.addEventListener('click', (e) => {
          e.preventDefault();
          const target = trigger.dataset.view;
          const outgoing = [...document.querySelectorAll('.view--active')];
          if (!outgoing.length || outgoing[0].dataset.view === target) return;

          document.querySelectorAll('.site-nav a').forEach(a => {
            if (a.dataset.view === target) a.setAttribute('aria-current', 'page');
            else a.removeAttribute('aria-current');
          });

          let pending = outgoing.length;
          outgoing.forEach(v => {
            v.classList.remove('view--active');
            v.addEventListener('transitionend', function handler(e) {
              if (e.target !== v || e.propertyName !== 'opacity') return;
              v.removeEventListener('transitionend', handler);
              v.setAttribute('inert', '');
              if (--pending === 0) {
                document.querySelectorAll(`.view[data-view="${target}"]`).forEach(nv => {
                  nv.removeAttribute('inert');
                  nv.classList.add('view--active');
                });
              }
            });
          });
        });
      });

    });
  </script>

</body>
</html>
